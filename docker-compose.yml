# docker-compose.yml — Inventory Management System
# Usage:
#   Infrastructure only (DB + MQTT): docker compose up -d
#   With Go app:                      docker compose --profile app up
#   With Traefik:                     docker compose --profile app up (Traefik starts with app profile)

services:
  # ── Traefik API Gateway ──────────────────────────────────────────────────────
  traefik:
    image: traefik:v2.11
    container_name: inventory_traefik
    restart: unless-stopped
    ports:
      - "80:80"        # HTTP entrypoint (routes to backend)
      - "8081:8081"    # Traefik dashboard
    volumes:
      # Read-only static config
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      # Dynamic config file
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - inventory_net
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── PostgreSQL + TimescaleDB ────────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: inventory_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-inventory_db}
      POSTGRES_USER: ${DB_USER:-inventory_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-inventory_secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-inventory_user} -d ${DB_NAME:-inventory_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventory_net

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: inventory_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - inventory_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── MQTT Broker (Mosquitto) ─────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: inventory_mqtt
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "9001:9001"       # WebSocket port
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./config/mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./config/mosquitto/acl:/mosquitto/config/acl:ro
      - mqttdata:/mosquitto/data
      - mqttlog:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -h localhost -p 1883 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - inventory_net

  # ── Golang Service ──────────────────────────────────────────────────────────
  app:
    profiles: ["app"]          # Only started with: docker compose --profile app up
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      MQTT_BROKER: mosquitto
    # No direct port exposure — traffic flows through Traefik only
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      traefik:
        condition: service_healthy
    networks:
      - inventory_net

volumes:
  pgdata:
  mqttdata:
  mqttlog:

networks:
  inventory_net:
    driver: bridge
    name: inventory_net   # static name — prevents Docker from prefixing project directory name
