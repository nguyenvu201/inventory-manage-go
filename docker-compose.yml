version: "3.8"

services:
  # ── PostgreSQL + TimescaleDB ────────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: inventory_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-inventory_db}
      POSTGRES_USER: ${DB_USER:-inventory_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-inventory_secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-inventory_user} -d ${DB_NAME:-inventory_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventory_net

  # ── MQTT Broker (Mosquitto) ─────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: inventory_mqtt
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "9001:9001"       # WebSocket port
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqttdata:/mosquitto/data
      - mqttlog:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -h localhost -p 1883 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - inventory_net

  # ── Golang Service ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      MQTT_BROKER: mosquitto
    ports:
      - "${LISTEN_ADDR_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - inventory_net

volumes:
  pgdata:
  mqttdata:
  mqttlog:

networks:
  inventory_net:
    driver: bridge
