# services/ms-ui/nginx.conf
# Nginx config cho Management Dashboard
# Serve Vue 3 SPA — tất cả routes về index.html (client-side routing)

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Cache static assets (JS, CSS, images) trong 1 năm
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Vue Router: tất cả requests → index.html (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint cho Traefik
    location /ui-health {
        return 200 '{"status":"ok","service":"ms-ui"}';
        add_header Content-Type application/json;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
