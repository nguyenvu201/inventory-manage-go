server:
  port: 8080
  mode: dev   # dev | release

postgres:
  host: localhost
  port: 5432
  username: inventory_user
  password: inventory_secret
  dbname: inventory_db
  sslmode: disable
  maxConns: 20
  minConns: 2
  connMaxLifetimeSec: 3600

redis:
  host: localhost
  port: 6379
  password: ""
  database: 0
  poolSize: 10

mqtt:
  # ── Local Mosquitto (Docker) ──────────────────────────────────────────────
  # broker: localhost
  # port: 1883
  # tlsEnabled: false
  # username: "inventory_app"
  # password: "change-me-locally"
  #
  # ── HiveMQ Cloud (Customer Preview) ──────────────────────────────────────
  broker: 29ae9d12a8c54f1295a5d2e1e4391c6c.s1.eu.hivemq.cloud
  port: 8883
  tlsEnabled: true
  clientId: inventory-manage-dev
  username: "YOUR_HIVEMQ_USERNAME"   # → Access Management tab trên HiveMQ Cloud
  password: "YOUR_HIVEMQ_PASSWORD"   # → thay bằng password thật, KHÔNG commit lên git

logger:
  level: debug
  fileLogName: ./storages/logs/inventory.log
  maxSize: 100      # MB
  maxBackups: 7
  maxAge: 30        # days
  compress: false

jwt:
  secretKey: "change-me-in-production"
  expiryHour: 24
