listener 1883
listener 9001
protocol websockets

# ── Bảo mật Lớp 1: Tắt anonymous, bắt buộc username/password ────────────────
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Bảo mật Lớp 2: ACL — phân quyền pub/sub theo topic ──────────────────────
acl_file /mosquitto/config/acl

# Persistence — lưu session khi client dùng CleanSession=false
persistence true
persistence_location /mosquitto/data/

# Keepalive: cho phép client keepalive tối đa 60s
# Client của chúng ta set 30s → nằm trong giới hạn này
max_keepalive 60

# Giữ persistent session tối đa 24h khi client offline
persistent_client_expiration 24h

# Giới hạn kết nối đồng thời (optional, tuỳ scale)
max_connections -1  # -1 = unlimited

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
